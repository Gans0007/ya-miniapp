<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YA Mini App Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        .card {
            background: var(--tg-theme-secondary-bg-color);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🔥 YA Mini App Test</h1>

<div class="card" id="user-info">
    Загрузка данных...
</div>

<button onclick="sendData()">Отправить данные боту</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // разворачивает на весь экран

    const user = tg.initDataUnsafe.user;

    if (user) {
        document.getElementById("user-info").innerHTML = `
            <p><strong>ID:</strong> ${user.id}</p>
            <p><strong>Имя:</strong> ${user.first_name}</p>
            <p><strong>Username:</strong> ${user.username || "нет"}</p>
        `;
    } else {
        document.getElementById("user-info").innerHTML = "Данные пользователя не получены";
    }

    function sendData() {
        tg.sendData("Mini App работает 🚀");
    }
</script>

</body>
</html>
