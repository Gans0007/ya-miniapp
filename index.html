<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YA Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: var(--tg-theme-secondary-bg-color);
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 16px;
}

.stats {
    display: flex;
    justify-content: space-between;
}

.stat-box {
    width: 30%;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    background: rgba(0,0,0,0.05);
}

canvas {
    background: var(--tg-theme-secondary-bg-color);
    border-radius: 16px;
    padding: 10px;
}
</style>
</head>

<body>

<h1>🔥 YA Dashboard</h1>

<div class="card">
    <strong id="username">Загрузка...</strong>
</div>

<div class="card stats">
    <div class="stat-box">
        <div>🔥 Streak</div>
        <h2 id="streak">7</h2>
    </div>
    <div class="stat-box">
        <div>💎 XP</div>
        <h2 id="xp">480</h2>
    </div>
    <div class="stat-box">
        <div>🏆 League</div>
        <h2 id="league">Steel</h2>
    </div>
</div>

<div class="card">
    <canvas id="xpChart"></canvas>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

if (user) {
    document.getElementById("username").innerText =
        "👤 " + user.first_name + " (" + user.id + ")";
}

// Fake XP history for demo
const ctx = document.getElementById('xpChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
        datasets: [{
            label: 'XP',
            data: [50, 80, 120, 200, 260, 350, 480],
            tension: 0.4
        }]
    },
    options: {
        plugins: {
            legend: { display: false }
        },
        scales: {
            x: { display: true },
            y: { display: true }
        }
    }
});
</script>

</body>
</html>
